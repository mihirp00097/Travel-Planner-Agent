<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>AI Travel Planner</h1>

        <label>Destination</label>
        <input type="text" id="destination" placeholder="Enter destination">

        <label>Number of Days</label>
        <input type="number" id="days" placeholder="Enter days">

        <label>Budget-₹</label>
        <input type="number" id="budget" placeholder="Enter budget">

        <label>Interests</label>
        <input type="text" id="interests" placeholder="Adventure, Beaches, Food, Activity...">

        <button onclick="generatePlan()">Generate Travel Plan</button>

        <div id="output"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
